name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chess-pretext

      - uses: actions/checkout@v4
        with:
          repository: chenglou/pretext
          path: pretext-repo

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: chess-pretext

      - run: npx vite build
        working-directory: chess-pretext

      - uses: actions/upload-pages-artifact@v3
        with:
          path: chess-pretext/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
